<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veda — InsightOne Voice Demo</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>

  <elevenlabs-convai
    id="veda-widget"
    agent-id="agent_3701kprrr0kter8ry42f7amz7apr">
  </elevenlabs-convai>

  <script>
    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name) || "";
    }

    function getVisitorId() {
      let id = localStorage.getItem("veda_visitor_id");
      if (!id) {
        id = "v_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
        localStorage.setItem("veda_visitor_id", id);
      }
      return id;
    }

    function isReturning() {
      return localStorage.getItem("veda_has_spoken") === "true" ? "true" : "false";
    }

    function markReturning() {
      localStorage.setItem("veda_has_spoken", "true");
    }

    function buildContext() {
      return {
        page_url: getParam("page_url") || "unknown",
        page_title: getParam("page") || "unknown",
        referrer: getParam("referrer") || document.referrer || "direct",
        utm_source: getParam("utm_source") || "direct",
        utm_campaign: getParam("utm_campaign") || "none",
        visitor_id: getVisitorId(),
        is_returning: isReturning(),
      };
    }

    const widget = document.getElementById("veda-widget");

    const context = buildContext();
    console.log("Veda context:", context);
    widget.setAttribute("dynamic-variables", JSON.stringify(context));

    widget.addEventListener("elevenlabs-convai:call-ended", () => {
      markReturning();
    });
  </script>

  <script
    src="https://unpkg.com/@elevenlabs/convai-widget-embed"
    async
    type="text/javascript"></script>

</body>
</html>
